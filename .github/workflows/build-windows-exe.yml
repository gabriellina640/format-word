name: Build Windows EXE

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build FormatWord.exe
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build executable
        run: |
          pyinstaller --noconsole --onefile --name FormatWord --hidden-import pypdf --hidden-import PIL.ImageTk --collect-data customtkinter main.py

      - name: Upload executable
        uses: actions/upload-artifact@v7
        with:
          name: FormatWord-windows-exe
          path: dist/FormatWord.exe
          if-no-files-found: error
